name: Mirror crow plugins

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install regctl
        uses: regclient/actions/regctl-installer@main

      - name: Run mirror script
        env:
          SOURCE: codefloe.com/crow-plugins
          TARGET: quay.io/amrkmn/crow
          SOURCE_REGISTRY_USERNAME: ${{ secrets.SOURCE_REGISTRY_USERNAME }}
          SOURCE_REGISTRY_PASSWORD: ${{ secrets.SOURCE_REGISTRY_PASSWORD }}
          TARGET_REGISTRY_USERNAME: ${{ secrets.TARGET_REGISTRY_USERNAME }}
          TARGET_REGISTRY_PASSWORD: ${{ secrets.TARGET_REGISTRY_PASSWORD }}
        run: bash ./crow-plugins-mirror.sh
