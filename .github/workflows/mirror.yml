name: Mirror crow plugins

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Run mirror script
        run: bash ./@crow-plugins-mirror.sh
